生數法以水一火二木三金四土五循環周始五至小息臟周乎一五十大息臟周乎十五臟氣全五十無止一臟氣絶則現乎止止數有常死期可擬數止之法從止數起凡五為周不及求止止應何臟是臟無氣自旺日平不旺而死政脈南北之政先立其年十分五運支立司天土運甲己金運乙庚水運丙辛木運丁壬火運戊癸土君余臣司天分別六化圖推陰陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之子午之上少陰治之丑未之上太陰治之寅申之上少陽治之卯酉之上陽明治之辰戌之上太陽治之己亥之上厥陰治之當歲年支司天居中南寸北尺移位相從南政面南甲己土運運尊濕土喻君之政少陰司天兩寸不應少陰在泉兩尺不應三陰居左則左不應三陰居右則右不應寸尺高下少陰為定北政四運面北行政少陰司天兩尺不應少陰在泉兩寸不應左右同前天人相應故脈沉細或無俱順諸脈不應反較診之反其診則應之非覆乎以沉為浮以小作大尺寸反死歲當陰脈在寸反見於尺尺之陰脈而移於寸歲當陽脈在尺反見於寸寸之陽脈而移於尺尺寸相反主死於子午卯酉四年矣陰陽交虛歲當陰脈在左反見於右右之陰脈而移於左歲當陽脈在右反見於左左之陽脈而移於右左右交錯主死寅申巳亥辰戌丑未八年矣勝負扶抑概論不勝春弦澀期弦澀氣等疾作秋時無弦春病無氣死摧脈兼所勝氣盛形微亦為平狀形緩氣勻長夏為恙失弦春病失氣死斷脈之子母有扶有抑子扶易愈春弦而鉤母抑退遲春弦滑流勝負扶抑以類推求各部不勝各部不勝臟屬求之左關浮澀左寸沉微右寸洪數尺中遲緩右關弦急木病非宜不勝期訣真臟之形純形無氣形陰氣陽水火有異肝至徑急如張弓弦心至浮洪彈石搏堅肺至輕浮吹毛揚然腎至沉絶解索而堅脾至柔弱疏數相兼水流不鼓屋漏不連雞距前小鳥啄脫堅肝絶庚辛心絶壬癸肺絶丙丁腎絶戊己脾絶甲乙不勝為忌月斷死期真臟氣微肝憂申酉心畏亥子寅卯刑脾巳午刑肺腎之所懼辰戌五未虛數期訣細數無力虛勞非宜數而有間月斷死期審獨盛衰三合相期如心獨盛甲子辰危數而無間日斷死期旬余之內如月而推真臟俱搏真臟俱搏兩手相同勢盛難制三者齊攻其一月支三合結局其二日支納音所屬如甲子乙丑海中金之類俱所不勝待相時助其三日時不應之母子挾母勢齊攻則故真臟俱搏所勝兼之所勝勢盛生子相期日乾三合所勝堪悲真臟俱搏不及兼之死於三合自旺日支上古三診上古之診三法俱行其一寸口氣口也參之人迎二穴在結喉旁各去一寸五分上下齊等引繩曰平偏盛為病審在何經人迎一盛少陽病侵二盛太陽三盛陽明寸口三盛病分三陰一厥二少三太相承手足經位躁前靜可究兼躁在手沉靜在足四盛以上俱為死候上曰格陽下曰關陰上下四盛關格穴臨其二分診十二經位三才九候三才天地人也九候三三為九勻盛為吉病者遲數大小獨異腎瀉虛補或施針刺其決死生衝陽為主衝陽穴在足胕上五寸骨間動脈胕上五寸無脈者死其三獨取氣口之位尺寸之候以判凶吉嗟哉傳遠三廢其二惟有尺寸獨天其藝
