body:
  text: 原序要略脈之為候立有統屬醫之心法斯其至矣統舉其概症應診言得統合之盡大而無餘屬求其精病見脈言得屬析之極微而不紊統之為制一部之脈上下之至狀同而兼前後候之屬之為度一脈之間上下之至狀異而有前後浮沉兩旁覆溢八候之別復又闡素問之妙奧集脈理之精詳參先哲之至言啓後學之捷徑幸輔吾志久遠相傳云爾統屬診法候病所在逐部求之平脈軟滑按部應時病脈反是小大獨異察部前後上下之至脈狀同否總屬之異統取其概屬細分位六部五屬五臟所主應乎五行同異之氣氣同合一氣異為二火同炎上異分兩丁左寸心為丁火小腸為丙火金同光騰異分明暗右寸肺為辛金大腸為庚金木同上達異分枯榮左關肝為乙木膽為甲木土同上聳異分起伏右關脾為己土胃為戊土水同潤下異分溢覆左尺腎為癸水膀胱為壬水前後脈同求之統候寸關用前兩尺用後臟腑之病各脈應之前後脈異水之屬候上至應前下之應後同中有異異者為逆同有強弱尤者為劣有和兼乖和順乖逆前病上升後病下降前後出部後覆前溢溢應上身覆應下體有脈偏行兩旁外內其診以指推進推出推出為外推進為內進為內侵侵內腹脹侵外身熱浮通主表頭面皮毛經絡筋骨百節四肢沉通主裡臟腑骨髓口舌咽喉大便小水虛為不及癢淋泄痿實為有餘熱湧痛郁且以統屬歧之為二統屬之法一部兩舉或以數部兼舉大意六部象同求所屬氣洪心火炎余可隅舉浮候諸陽主病在表浮實邪盛浮虛氣少浮大無力內傷陽氣浮盛按衰裡虛表實浮有按無無根之誚梢兩寸浮盛風寒外召關脈浮盛腹脹溲澀左尺浮盛小便赤澀右尺浮盛浮促風祕肝腎並浮則為風濕沉候諸陰主病在裡沉實為積沉虛少氣甘寸沉氣鬱尺沉本位喘嗽肺浮轉沉則卒肝腎並沉則為石水遲為陰盛氣血稽遲遲實為痛遲虛寒推消中遲逆夏忌沉遲寸遲氣少尺遲血虧左關脅痛右食傷脾數為陽盛氣血燔灼數實為熱數虛為燥浮數有力傷寒熱燥浮數無力傷寒痰嗽沉數有力實大火內灼浮數惡寒或脈時數且有痛處皆主癰作病退數時未足為樂數退症危真元已脫數按不鼓虛寒相搏微數禁灸疏數難保細數而虛虛癆陰弱兼沉骨蒸兼浮喘作加之汗嗽喉痛俱惡數宜傷寒小兒妊瘧左寸數兮或緊與數俱主頭疼數仍吐惡數短心痛數虛口瘡數止為毒數健為狂右寸數兮肺金火燥兼緊上疼兼滑喘嗽洪數弦緊喘嗽亦作沉數骨熱夏來最惡左關數緊主疼居脅數止因怒數長壯熱右關數緊口臭而燥浮而帶數易飢易飽左尺逢數赤尿淋濁數止亦淋數虛瘡作右尺數臨大便結燥滑為血聚熱痰孕吐滑雜大小吐瀉傷腑滑數痰盛最嫌肌瘦秋病浮滑為子扶母秋逢沉滑冬月必死左寸浮滑暈眩之候洪數滑為孕左關同究左尺脈滑淋痛熱蓄滑弱陽痛滑短崩漏洪浮而滑精氣不固右寸脈滑痰火上升沉細而滑臨晚骨蒸沉緊而滑咳嗽痰凝關滑按澀宿食中停弦滑有孕緊滑蟲疼短滑病酒尺滑痢興和滑孕子止滑凝經澀為血少惡寒敗血帶下遺精盜汗痿瀉浮澀惡寒沉澀陰逆緊澀為痹弦澀少血澀甚多痰最難扶濟寸沉弦澀痰甚喘急左關常澀必患風氣右關逢澀飲食少入尺浮弦洪兼澀腳氣尺沉澀虛左右有異左帶遺精右帶瀉痢實為氣壅熱痛吐逆脈實而滿四逆頭熱春秋為順冬夏為逆左寸脈實咽千熱騰實火面熱煩躁體痛左關脈實腹痛胸膨浮實而大赤痛侵睛沉實長大壯熱陽乘左尺脈實溲實澀腹痛右寸脈實氣壅兼痰關實消食尺實便難虛為虛症耗散氣血驚悸恍惚倦痿汗泄虛火陽虧內傷發熱夏虛傷暑身熱汗痢左寸虛暈右寸下血左關眼花右關倦泄尺虛寸搏女人崩血肝腎並虛夭命將絶左血右氣早宜補益洪為熱候虛實宜別浮洪無力虛火宜益沉洪有力實大火宜瀉洪急腹脹洪滑痰熱洪數暴吐必傷於熱洪為病進脈宜轉細秋冬右沉老人病逆寸洪弦實尺小汗泄浮澀沉細病分久暫左寸逢洪頭疼心熱左關逢洪四肢發熱左尺逢洪溲澀熱結右尺逢洪便燥足熱肺洪心微疼居左脅洪緊腹脹洪虛晚熱細為少氣脈因而斂前大後細頭疼目眩後大前細氣短而驗沉細候積急小眥瘕勻細五陰男平女孕朝細暮大氣血因凝乍大乍小邪祟相凌數更細澀不久歸冥寸關細虛尺沉細澀濡細脛清兼緩偏墜緊為寒痛隨位而別寸上尺下浮外內沉癰疽緊洪疝瘕緊細盛緊脹食浮緊寒熱頭痛項急無汗鼻窒左寸浮緊傷寒頭痛沉緊心氣左關浮緊筋骨痛凝沉弦脅議左尺浮緊腰足疼急沉緊腹痛小便短澀浮緊沉澀兼虛耳閉右寸浮緊頭痛寒鬱浮緊而洪邪傷喘息沉緊而洪咽痛糞祕沉緊而滑痰盛火熾右關浮緊腹脅脹氣沉緊腹痛尺緊疝病緩為膚頑風熱濕痹浮大傷風頭疼發熱有汗咳嗽鼻流清涕左寸浮緩傷風表郁沉緩心虛神昏失措左關浮緩汗連背急沉緩氣虛左尺緩痿小便頻數女多月水右寸浮風沉緩虧肺關緩胃氣尺緩足弱長為和平心神腎壽左關長溢男痛女欲右關滑吐長緊胃湊浮洪癲狂沉細內積傷寒脈長陽明症候左寸心悶右寸痰鬱左關伏瘕右關積聚急痛洪滯弦果滑酒兼澀肉食兼濡為氣左尺溲難女為閉經右尺洪長大便燥結短為氣病陽不能升寸短頭痛尺短脛清促為陽盛狂怒五積漸退則生漸進病亟結為陰盛陽無所從浮結表寒沉積其中傷寒結代悸動心宮代為氣衰宜於風痛革為虛寒血崩半産傷精虛瀉病判久暫牢為裡實胃氣不足骨病痛疲癆腹脹氣促弦為氣斂寒熱拘急瘧癆虛寒積飲冷痹弦而滑軟平和之至十人九弦斯之謂矣弦多軟少為病之候春弦主吉秋弦木抑浮弦有力風邪外束寒傳少陽弦長為積弦數雜症弦浮澀瘧左關弦滑寒微熱盛右關虛弱補劑方施左弦濡澀脊痛須知浮沉弦澀痰盛榮虧沉小澀弦虛汗淋漓右洪弦急火旺陰虛癆症遇此非藥能除左寸浮弦按散失血弦大按澀為癇可決右寸浮弦按大痰熱浮洪弦虛頭痛氣怯左關逢弦所兼有別浮陽沉陰內寒外熱浮陰沉陽寒熱反是右關弦細兼急為逆肝乃刑脾兼洪可治尺弦沉澀陰症寒厥弦急為痛隨部而別右關兼浮痧發氣逆雙弦為飲兼出而細關尺脅痛寸為涎溢動為體痛勞驚崩瀉陽動汗出陰動發熱芤為失血各驗所出左寸吐紅右衄溲咳右血吐逆左關淤血左尺女崩男為尿血右尺逢芤大便下血濡為汗候表虛少氣左寸逢瀉濡盜汗驚悸左關逢濡體虛無力左尺逢濡陽痿傷精小便頻數女為血崩右寸逢濡自汗氣怯關濡停食尺濡泄瀉弱為弱候內傷氣血寸寒尺熱老順少逆左寸逢弱盜汗心悸右寸逢弱身寒短氣左關逢弱筋軟無力右關逢弱不能消食左尺逢弱骨疼酸體小便頻數腎虛耳閉右尺弱瀉兼澀失氣散為血虧表強里怯浮洪兼散夏月本脈傷寒逢散症忌嗽逆滑散孕子散多則逆散如解索産後宜益微為虛候脈微絶産左寸汗悸左關膨脹女左關崩左尺濁帶男主精泄兼澀經凝尺大按微病者則凶右尺逢微惡寒虛怯關微停食尺微虛瀉伏為積滯脈藏不出伏細少氣伏數熱厥左寸逢伏神不守舍右寸逢伏肺中痰結關尺逢伏皆積於內統有未盡參用屬中寸關候前尺後相同為之為法一部八候前後浮沉兩旁溢覆左寸前位心之所候專司血脈舌汗之屬浮澀弦參表虛惡寒痰嗽頭暈澀短溢弦急細滑大八者浮兼俱主頭痛滑短相連弦澀芤濡兼沉泄汗沉滑頭昏痰盛火炎沉洪而健頭痛痰涎沉弦虛短不寐皆然浮弦肥澀熱熾口乾短滑崩血尺澀云兼左寸後候膻中宗氣凡診浮分弦大而澀虧經傷衛臂痛痰鬱弦澀脊軟弦大心跳細澀芤短皆為驚悸浮大而滑手心極熱沉分細澀驚悸之類右寸前肺皮毛腠理應指浮兼細短滑澀浮洪溢寸俱主頭痛浮弦上溢肩背服脹急浮澀弦洪惡寒血衄沉澀弦洪虛實有異虛嗽痰紅實痰凝滯沉緊洪滑沉弦短澀嗽痰侵肺短仍少氣芤為衄血虛大鼻窒右寸後候胸中陽氣按浮弦澀邪傷本位胸膺主痛沉短滑澀沉滯弦肥氣短痰鬱沉弦實大胸中壅窒沉弦火虛上焦痞急火滑熱痰實脹虛痞左關前候肝膽同部肝主藏血脅筋之內如診浮澀虛弦短急目眩榮虧疼拘筋骨浮弦洪澀紅脹侵目沉細弦澀肢麻脅脹弦洪芤滑皆為昏眩左關後候中焦膈位診浮弦澀病主偏墜沉弦澀大膈疼而熱短芤皆脹屬膈之類右關前胃專司納受吐脹氣短口淡停滯診浮洪滑短小弦澀或浮溢關惡噦傷食浮澀弦大面熱時至沉痛沉短沉中弦澀弱而胃虛嘔吐少食沉弦澀細胸滿噯氣沉短微澀氣疼居胃沉澀弦大審之虛實兼虛腹脹兼實消食沉短口淡沉滑宿滯沉弦溢關胃脘痛急洪滑嘈雜胃氣之病右關後脾專司運化四肢氣血濕倦注下診逢浮澀或兼弦候肢體惡寒倦怠少食虛弦細澀不耐寒食沉小虛弦肢倦無力沉弦洪澀水瀉停滯弱兼澀小飢飽斯易洪健易飢洪澀食滯沉逢短細俱為少食微芤痰紅芤甚崩痢兼澀吐紅下血痢瀉兩尺前腎水火左右專司骨髓腰耳精瞳診浮弦澀俱為耳聾沉而兼澀弦大渴詳沉弦細弱皆主滑精沉急沉澀均主腰疼弱短弱澀俱主耳鳴緩細腰痛芤乃日昏左尺後部以候小腹膀胱前陰外臁膝足如診浮澀或兼弦胕膝足冷麻右浮同候弦沉長濡偏墜之屬妊脈沉澀必為胎漏沉洪沉滑沉大弦滯均為淋濁小兒赤澀沉細兼澀沉弦兼伏沉澀或短男為夢遺女人白帶老者多尿弦澀侵內小腹塊疼芤為血尿長覆凝經沉微而澀女為血淋右尺後部後陰與腹浮弦澀滿肛門腫毒浮小短澀脫肛痔漏沉澀洪弦冬兼其健大便燥堅沉小而弦弦洪濡短溏結之便沉洪而滑初興之痢沉短而澀久痢不足沉微與芤下紅臟毒沉弦澀滿瀉因食阻短滑下紅足膝麻木弱與弱澀虛瀉宜因沉小虛澀脾同瀉後沉短弱澀損氣宜補腹中之候需分左右脈訣總歌浮風虛暑滑胎痰實壅弦勞遲主寒洪數熱多芤失血澀微少血緩膚頑緊痛沉里濡多汗促結與伏郁痰看短是氣虛長是積動驚牢弱骨疼酸革崩半産細傷濕散由血耗代將亡脈理詳解辨求脈之象奇偶為候奇者單求偶者對舉單求無配代牢之類對偶反正浮表沉里脈之診法義理幽微小兒男婦大同小殊辭難盡意觸類可推庶為蒙引毋惑他歧浮脈體泛現於皮毛輕按便得如水之波浮者泛也如水漂木之狀沉輕按無稍重應指重按有力猶石沉水浮按全無中按微有沉按至筋骨間方應沉者沒也重按至筋骨間方有力如石匿水之狀遲脈來徐呼吸三至一息三至遲者慢也減於平脈一至數脈來急呼吸六至一息六至數者急也加於平脈一至滑體圓淨往來流利荷上水珠旋轉無異滑者利也應指圓淨澀形遲短來急去滯至而帶止刮竹相似澀同澀遲短不調舉要曰如雨沾沙澀難而轉實乃充實舉按有力浮中沉三候俱有力虛乃空虛舉按無力浮中沉三候俱無力洪者倍常大而滿部愊愊應指肥於平脈一倍細者減常一線之比應指如線瘦於平脈一倍緊者徑急大而搏指如轉索狀即弦有力緩者縱緩中軟不急如緯在經即弦無力長為修長如弦之直通過本部兩頭出指短為縮短不及本位喻之於龜縮頭曳尾短脈或前有後無或無前有後或中間有兩頭無與長脈相反曰短結為交結遲中暫止一止復來而無常促為催促數中暫止一止復來而無常代為更代動而中止不能自還良久復至止數有常非暫之比如十動一止俱十動一止來自骨肉之分升於皮毛之際微轉而止悉有常數由於一臟氣絶他臟更代而行牢本堅牢沉弦大實不上不下牢守其位弦為琴絃初中末直其來挺然而不搏指即端直而長革為皮革浮大弦虛應指平潤如按鼓皮即外急中空動乃動搖短滑數備上下不分連動中位中乃一部之中非中候關脈也芤乃草名浮大無力因按而知中虛旁實浮按而軟重按則四旁皆有中間空虛如芤草管外軟中空之狀芤脈因按而後知也濡者不堅浮細無力按隨指下無頭有尾濡音者軟如帛漫水之狀弱軟沉細比虛不及全無起伏扶持不起散者不斂浮中滿指按則分散而不團聚或類解索散無統紀應指浮大或二三至而無統紀如解索之狀微為微眇較細不及似有似無蛛絲相類即應指極細代為埋伏骨外筋里三按俱無推筋可取浮中沉三按俱無必推開其筋診方應指而得其脈者也經絡部位脈之所生根於胃氣胃為脾腑司納飲食飲食化精上輸心肺輸心生血輸肺生氣血陰氣陽流行脈至陽衛精外陰營脈里脈從經中猶水之注經者謂氣血流行經常不息也正經十二生髮於心由肺分布手足頭身內屬臟腑腑陽臟陰陰陽配合循環無停手太陰經肺臟所繫起於中焦胃口下出絡於大腸絡繞也還循膈出上屬於肺屬會也從之肺系橫從腋下肩脅下曰腋下循臑內膊下前腋處為臑肩肘之間也手厥陰前心經肘臂之內臑盡處為肘臂節也上骨下廉廉偶也邊也寸口魚際寸口穴在寸脈陷中魚際穴在大指大節後內側上大指端端秒也內側乃竭支者出腕經之旁出大者為支臂盡處為腕手陽明接臑者音儒肱骨也腕音宛肘下骨手陽明經內腑大腸起於食指內側之端循指上廉歧骨之間內骨分處為歧骨上腕外側界兩筋間循臂上廉肘外紋旁臑外前廉上骨禹骨端骨禹骨穴在肩兩骨間陷處腕宛中舉臂有孔處肩前巨骨缺盆下臟膺上橫骨為巨骨巨骨陷中為缺盆絡肺下鬲膈屬之大腸支從缺盆上頸貫頰頭莖為頸耳下曲處為頰挾口上唇交人中穴人中穴在鼻下左從右達右從左出上挾鼻孔足陽明接骨禹音虞肩前骨足之陽明胃腑之經起於內眥眥乃目角鼻外下行夾吻屈轉相依下唇承漿陷會承漿穴在唇下陷中卻循順行頤後下廉腮下為頷領下為頤人迎而橫人迎穴在曲頰前一寸六分曲頰前上耳前陷內歷鬢之前上額顱際直者人迎結喉旁垂缺盆下膈屬胃絡脾支者缺盆行於乳內挾臍直下氣街相接氣街即氣衝穴在歸來下鼠奚上一寸動脈應於宛中支者胃中循腹中穿氣街脾關股外為髀髀前膝上為伏兔後交絞為髀關是也入膝臏中挾膝解中為臏䯒骨外廉脛股為䯒足跗上入中指外邊支從胕出足太陰接臏音賓膝蓋骨髀音俾股外也䯒音行胕音膚足趾也足之太陰脾臟之經起大指內白月之邊核骨後上核骨拐骨也內踝前廉足後跟兩旁骨為踝腨內腨外踝上五寸為腨足厥陰前行上循膝股內前廉髀內為股入腹屬脾臍上下為腹絡胃上穿貫膈挾嗌嗌與咽同義與舌相連支者從胃注意心終焉核音核踝音胯足外也臑音段嗌音咽手少陰心為心臟起下落小腸上屬心系支者從心心系上溢挾之咽喉系之目系直者從心上肺橫遷出腋下循臑內後廉手厥陰後肘臂內廉上抵掌後兌骨之際腕外踝為兌骨掌內後廉小指內竭交手太陽不假支別手之太陽小腸腑經起小指端手外側行上從腕出踝中直步臂內下廉肘內側月兩筋之內臑外之後上行肩解肩脾交膂脊兩旁為膂上兩角為肩下成片骨為肩脾穴上入缺盆絡心循嗌下抵膈胃小腸屬焉支出缺盆上頸曲頰外眥入耳支從頰䪼抵鼻內眥足太陽接䪼音拙足之太陽膀胱腑經內眥而起上額循巔巔者頂也絡腦下項頸上為腦腦後為項肩膊內廉肩後之下為膊骨挾脊絡腎椎骨為脊膀胱屬焉支者貫臀股下為臀入膕中穿膝後曲節處為胭一支上至天柱分肩天柱骨在肩脾之上際會處也膊內貫胂夾脊骨也挾脊下焉過臀髀樞即脾厭又名環跳穴髀外後廉膕外臑內外踝後纏至小指外足少陰連膕音國胂音申足之少陰腎臟之經起小指下趨足湧泉湧泉穴在足心陷中屈足卷指宛在其中內踝前側出轉踝從邊跟中臑內跟足跟也上膕內廉股內後隅脊膂中穿屬腎出絡膀胱值焉直者從腎貫肝膈出入於肺中循喉挾舌支從肺行注於胸中手之厥陰心包經通起於胸內臟屬膻中膻中穴在兩乳之間正值心前空處以藏宗氣又曰天氣亦曰靈樞謂之氣海是也歷絡三焦焦原也胸為上焦氣之原也膈為中焦血之原也腹為下焦水之原也靈樞經曰上焦如霧中焦如漚下焦如瀆云胸膈腹中支從胸出橫行於脅腹旁為脅上抵腋下脅上為腋循臑中出行手太陰少陰經內肘中下臂行兩筋中入於掌內中指乃竭支別掌中手少陽接手之少陽三焦腑經無名指端外側起焉上行歧骨腕臂外邊骨間肘外臑外上肩大椎之側大椎穴在第一椎陷中缺盆一穿絡之膻中三焦屬焉支從膻中缺盆陷出上行耳頂耳上角折下循耳前從頰至䪼支者耳後入於耳內出耳外眥足少陽接足之少陽膽腑之經起外眥鬢陽角後懸耳後腦側下項循肩肩頸缺盆肩井穴在肩上陷中下腋季脅脅中之骨為季骨穴後起髀厭髀陽膝外髀外太陽陽明之間輔骨之前䯒骨外為輔骨下抵絶骨外踝以上為絶骨外踝足跗小次指兼支從耳後出走耳前外眥人迎頰車頸穿缺盆合原貫膈絡肝膽腑屬焉出脅氣街毛際髀厭支從跗上大指間遷歧骨內出足厥陰連足厥陰經肝臟所屬起大指外聚毛循跗轉內踝前中封之所中封穴在內踝前一寸許陷中仰足取之上踝八寸足太陰後自膕內廉曲泉循股曲泉穴在輔骨下大小筋陷中曲膝得之即膝旁橫頭紋處也陰中環繞腎囊左右入小腹旁挾之胃腑屬肝絡膽脅前喉後會頑自額頑者顙也外升顛交督督脈支者目系下頰環口復貫膈脾注肺乃伏奇經督任陰陽同宗督起下極下極之俞兩陰之間屏翳處也兩筋為纂